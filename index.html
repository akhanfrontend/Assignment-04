<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation TuteDude Assignment-04</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

     <!-- main container -->

<div class="container">

   

    <h1 class="main-form">Please Login</h1>

    <div class="innerside">

        <!-- start form from here -->

        <form>

            <label>Email</label><br> <br>
            <input type="text" id="email" placeholder="Enter your email"><br><br>

            <label>Phone Number</label><br> <br>
            <input type="text" id="phone" placeholder="Enter your phone number"><br><br>

            <label>Password</label><br> <br>
            <input type="password" id="password" placeholder="Enter your Password"><br><br>

            <button type="button" id="btn">Submit</button>

            <p id="popUp"></p>

        </form>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
